name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'AuraShell ${{ github.ref_name }}'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Find and upload macOS artifacts
        if: matrix.platform == 'macos-latest'
        run: |
          echo "Listing target directories..."
          ls -la src-tauri/target/
          if [ -d "src-tauri/target/aarch64-apple-darwin/release/bundle" ]; then
            echo "Found aarch64 bundle"
            ls -R src-tauri/target/aarch64-apple-darwin/release/bundle/
          fi
          if [ -d "src-tauri/target/x86_64-apple-darwin/release/bundle" ]; then
            echo "Found x86_64 bundle"
            ls -R src-tauri/target/x86_64-apple-darwin/release/bundle/
          fi

      - name: Upload macOS aarch64 artifacts
        if: matrix.platform == 'macos-latest' && matrix.args == '--target aarch64-apple-darwin'
        uses: actions/upload-artifact@v4
        with:
          name: aurashell-macos-aarch64
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/
          retention-days: 30

      - name: Upload macOS x86_64 artifacts
        if: matrix.platform == 'macos-latest' && matrix.args == '--target x86_64-apple-darwin'
        uses: actions/upload-artifact@v4
        with:
          name: aurashell-macos-x64
          path: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/
          retention-days: 30

      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: aurashell-linux-x64
          path: |
            src-tauri/target/release/bundle/
          retention-days: 30

      - name: Find and upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          Write-Host "Listing target directories..."
          Get-ChildItem -Path src-tauri\target\release\bundle -Recurse | Format-Table Name, FullName

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: aurashell-windows-x64
          path: |
            src-tauri/target/release/bundle/
          retention-days: 30
